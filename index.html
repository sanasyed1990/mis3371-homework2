<!DOCTYPE html>
<html>
<head>
    <title>Patient Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<h1>Patient Registration</h1>

<form id="myForm" onsubmit="return validatePassword()">

<label>First Name:</label>
<input type="text" id="firstName" pattern="[A-Za-z'-]{1,30}" required>

<label>Last Name:</label>
<input type="text" id="lastName" pattern="[A-Za-z0-9'-]{1,30}" required>

<label>Email:</label>
<input type="email" id="email" required>

<label>Phone:</label>
<input type="text" id="phone" pattern="\d{3}-\d{3}-\d{4}" required>

<label>Password:</label>
<input type="password" id="password" required>

<label>Confirm Password:</label>
<input type="password" id="confirmPassword" required>

<br><br>

<label>Desired Salary:</label>
<input type="range" min="20000" max="200000" value="50000" id="salary" oninput="updateSlider()">
<span id="salaryValue">50000</span>

<br><br>

<button type="button" onclick="reviewForm()">Review</button>
<button type="submit">Submit</button>

</form>

<div id="reviewSection">
<h2>PLEASE REVIEW THIS INFORMATION</h2>
<div id="reviewOutput"></div>
</div>

</body>
</html>
