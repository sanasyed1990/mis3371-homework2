<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FirstLine Health - Patient Registration</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div id="header">
    <div class="header-left">
        <img src="logo.png" alt="FLH Logo" class="logo">
    </div>
    <div class="header-center">
        <h1>FirstLine Health</h1>
    </div>
    <div class="header-right" id="currentDate"></div>
</div>

<div id="main">

<h2>Patient Registration Form</h2>

<form onsubmit="return validatePassword()">

<table>

<tr>
<td>First Name:</td>
<td><input type="text" id="firstName" pattern="[A-Za-z'-]{1,30}" title="Letters only" required></td>

<td>Last Name:</td>
<td><input type="text" id="lastName" pattern="[A-Za-z0-9'-]{1,30}" required></td>
</tr>

<tr>
<td>Email:</td>
<td><input type="email" id="email" required></td>

<td>Phone:</td>
<td><input type="text" id="phone" pattern="\d{3}-\d{3}-\d{4}" title="123-456-7890" required></td>
</tr>

<tr>
<td>Zip Code:</td>
<td><input type="text" id="zip" pattern="\d{5}(-\d{4})?" required></td>

<td>User ID:</td>
<td><input type="text" id="userId" pattern="[a-zA-Z][a-zA-Z0-9_-]{4,29}" required></td>
</tr>

<tr>
<td>Password:</td>
<td><input type="password" id="password" required></td>

<td>Confirm:</td>
<td><input type="password" id="confirmPassword" required></td>
</tr>

<tr>
<td>Salary:</td>
<td colspan="3">
<input type="range" id="salary" min="20000" max="200000" value="50000" oninput="updateSlider()">
<span id="salaryValue">$50000</span>
</td>
</tr>

<tr>
<td colspan="4" style="text-align:center;">
<button type="button" onclick="reviewForm()">Review</button>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>

<div id="reviewSection">
<h2>Review Information</h2>
<div id="reviewOutput"></div>
</div>

</div>

<div id="footer">
FirstLine Health | Houston, TX
</div>

<script>
const dateElement = document.getElementById("currentDate");
const today = new Date();
dateElement.innerHTML = today.toDateString();
</script>

</body>
</html>
